services:
  - type: web
    name: zen-progress-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://zen-progress-tracker.netlify.app
      - key: PORT
        value: 10000
