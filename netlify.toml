[build]
command = "cd frontend && npm install && npm run build"
publish = "frontend/dist"

[[redirects]]
from = "/api/*"
to = "https://progress-tracker-backend.onrender.com/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[env.production]
  [env.production.build.environment]
    VITE_API_URL = "https://progress-tracker-backend.onrender.com"

[env.preview]
  [env.preview.build.environment]
    VITE_API_URL = "http://localhost:5000"

[context.deploy-preview]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"
