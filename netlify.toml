[build]
base = "frontend"
command = "npm run build"
publish = "dist"
functions = "functions"

[[redirects]]
from = "/api/*"
to = "https://progress-tracker-backend-zwwy.onrender.com/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[env.production]
  [env.production.build.environment]
    VITE_API_URL = "https://progress-tracker-backend-zwwy.onrender.com"
    NODE_ENV = "production"

[context.deploy-preview]
  [context.deploy-preview.environment]
    VITE_API_URL = "https://progress-tracker-backend-zwwy.onrender.com"
